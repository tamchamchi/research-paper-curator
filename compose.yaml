services:

  api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE_URL=mysql+pymysql://rag_user:rag_password@mysql:3306/rag_db
    networks:
      - rag-network

  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    environment:
      - MYSQL_DATABASE=rag_db
      - MYSQL_USER=rag_user
      - MYSQL_PASSWORD=rag_password
      - MYSQL_ROOT_PASSWORD=123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u rag_user"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  mysql_data:

networks:
  rag-network:
    driver: bridge